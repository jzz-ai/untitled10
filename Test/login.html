<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - Simply Rugby</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sru-navy: #0A1C3E;
            --sru-blue: #1D4ED8;
            --sru-blue-light: #3B82F6;
            --text-dark: #0F172A;
            --text-gray: #475569;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            display: flex; height: 100vh;
            background: url('https://tse1.mm.bing.net/th/id/OIP.gzoCCjUAk-090kqbQlTcuQHaE7?rs=1&pid=ImgDetMain&o=7&rm=3') center/cover no-repeat;
            justify-content: center; align-items: center; position: relative; overflow: hidden;
        }

        body::before { content: ''; position: absolute; inset: 0; background: rgba(10, 28, 62, 0.45); z-index: 1; }
        body::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%); z-index: 2; }

        .auth-form-container {
            position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 48px 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
            opacity: 0; animation: fadeUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUpIn { 0% { opacity: 0; transform: translateY(40px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

        .auth-header { text-align: center; margin-bottom: 24px; }
        .logo-container { margin-bottom: 16px; display: inline-flex; justify-content: center; align-items: center; width: 64px; height: 64px; background: linear-gradient(135deg, var(--sru-blue), var(--sru-navy)); border-radius: 16px; box-shadow: 0 8px 16px rgba(10, 28, 62, 0.3); }
        .auth-header h1 { font-size: 26px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; letter-spacing: -0.5px;}
        .auth-header p { color: var(--text-gray); font-size: 14px; font-weight: 500; }

        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }

        input, select {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 12px;
            font-size: 15px; color: var(--text-dark); outline: none; transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            /* 对于 select，确立与 input 一致的视觉 */
            appearance: none; -webkit-appearance: none;
        }

        /* 自定义 Select 的下拉箭头容器 */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '\f107'; /* FontAwesome 向下箭头 */
            font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-gray); pointer-events: none;
        }

        input::placeholder { color: #94A3B8; }
        input:focus, select:focus {
            border-color: var(--sru-blue-light); background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15), inset 0 2px 4px rgba(0,0,0,0.01);
        }

        /* 针对 Select 下拉菜单中的选项样式调整 */
        select option { font-weight: 500; color: var(--text-dark); background: white; }

        .options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; margin-top: 8px; font-size: 13px; }
        .options a { color: var(--sru-blue); text-decoration: none; font-weight: 600; transition: 0.2s;}
        .options a:hover { color: var(--sru-navy); }

        .btn-login {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--sru-blue) 0%, #2563EB 100%);
            color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(29, 78, 216, 0.4); }
        .btn-login:active { transform: translateY(0); }

        .btn-guest {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.5); color: var(--text-dark);
            border: 1px solid rgba(15, 23, 42, 0.1); border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; margin-bottom: 24px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-guest:hover { background: rgba(255, 255, 255, 0.9); border-color: rgba(15, 23, 42, 0.2); transform: translateY(-1px);}

        .register-link { text-align: center; font-size: 14px; color: var(--text-gray); }
        .register-link a { color: var(--sru-blue); font-weight: 700; text-decoration: none; transition: 0.2s;}
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-form-container">
    <div class="auth-header">
        <div class="logo-container">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="M12 8v8"></path>
                <path d="M9 10h6"></path>
                <path d="M9 14h6"></path>
            </svg>
        </div>
        <h1>Simply Rugby</h1>
        <p>Official Volunteer Coordination & Scheduling System</p>
    </div>

    <div class="form-group">
        <label>Select Your Role</label>
        <div class="select-wrapper">
            <select id="userRole">
                <option value="VOLUNTEER">🛡️ Club Volunteer</option>
                <option value="COORDINATOR" selected>⚡ Volunteer Coordinator</option>
                <option value="MANAGER">👑 Club Executive/Manager</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@simplyrugby.com" value="admin@simplyrugby.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="password123">
    </div>

    <div class="options">
        <label style="display: flex; align-items: center; gap: 8px; font-weight: 500; margin-bottom: 0; cursor:pointer;">
            <input type="checkbox" style="width: 16px; height: 16px; accent-color: var(--sru-blue); cursor: pointer;"> Remember me
        </label>
        <a href="#">Forgot Password?</a>
    </div>

    <button class="btn-login" onclick="executeLogin()">Secure Login</button>
    <button class="btn-guest" onclick="window.location.href='visitor.html'">
        <i class="fa-regular fa-compass"></i> Browse as Guest
    </button>

    <div class="register-link">
        Don't have a club account yet? <a href="register.html">Apply to join now</a>
    </div>
</div>



<script>
    async function executeLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const selectedRole = document.getElementById('userRole').value;

        if (!email || !password) {
            alert("Please enter both your email and password!");
            return;
        }

        const btn = document.querySelector('.btn-login');
        const originalText = btn.innerHTML;
        btn.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin'></i> Authenticating...";
        btn.disabled = true;

        try {
            const response = await fetch("http://localhost:8080/user/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    role: selectedRole
                })
            });

            const res = await response.json();
            console.log(res);

            if (res.code === 200) {
                localStorage.setItem("token", res.data.token || "");
                localStorage.setItem("userId", res.data.id || "");
                localStorage.setItem("userName", res.data.name || "");
                localStorage.setItem("userEmail", res.data.email || "");
                localStorage.setItem("userRole", res.data.role || "");

                window.location.href = res.data.redirectUrl;
            } else {
                alert(res.msg || "Login failed");
            }
        } catch (e) {
            console.error(e);
            alert("Backend request failed.");
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>
